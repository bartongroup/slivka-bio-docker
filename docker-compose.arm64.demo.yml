# For running on ARM64 hosts with amd64 emulation
# Forces slivka-bio to use the amd64 image under emulation
# Use docker-compose.demo.yml for native multi-platform support

name: slivka-bio-demo

services:
  slivka-bio:
    image: drsasp/slivka-bio:dev
    platform: linux/amd64
    pull_policy: always
    volumes:
      - media:/opt/slivka/media
    ports:
      - "4040:4040"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/slivka

  mongo:
    image: mongo:latest
    volumes:
      - mongo_data:/data/db
    ports:
      - "27018:27017"

  jupyter:
    image: jupyter/base-notebook:latest
    volumes:
      - ./demo:/home/jovyan
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: start-notebook.sh --NotebookApp.token=''

volumes:
  media:
  mongo_data:
